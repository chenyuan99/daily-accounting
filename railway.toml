[build]
builder = "dockerfile"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn rdie.wsgi --bind 0.0.0.0:$PORT --log-file - --workers 2"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
