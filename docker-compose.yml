version: '3'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: web
    container_name: web
    hostname: web
    restart: always
    command: python3 /code/manage.py runserver 0.0.0.0:8080
    volumes:
      - .:/web
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://dev:123456@db:5432/dev
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: db
    hostname: db
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=dev
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=123456
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
